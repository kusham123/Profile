version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - echo "Installing root dependencies..."
            - npm ci --legacy-peer-deps --prefix ../../
        build:
          commands:
            - echo "Building web app..."
            - npm run build --workspace=@apps/web --prefix ../../
      artifacts:
        baseDirectory: apps/web/out
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/node_modules/**/*
