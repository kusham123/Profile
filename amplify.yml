version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - echo "Installing dependencies..."
            - npm install --prefer-offline --no-audit --no-fund
        build:
          commands:
            - echo "Building web app..."
            - npm run build
      artifacts:
        baseDirectory: out
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
