version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - echo "Installing dependencies at root level..."
            - cd ../../ && npm install --legacy-peer-deps
        build:
          commands:
            - echo "Building web app..."
            - npm run build --workspace=@apps/web
      artifacts:
        baseDirectory: apps/web/out
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/node_modules/**/*
