version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build --workspace=@apps/web
      artifacts:
        baseDirectory: apps/web
        files:
          - '.next/**/*'
          - 'public/**/*'
          - 'package.json'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/node_modules/**/*
